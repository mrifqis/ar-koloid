<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover"">
    <title>AR Campuran: Larutan, Koloid, Suspensi</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- A-Frame Look-at Component -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- UI Overlay -->
    <div id="ui-container">
        <div class="header">
            <h1>Perbandingan Campuran</h1>
            <p>Arahkan kamera ke marker Hiro</p>
        </div>

        <!-- Info Legend -->
        <div id="info-panel" class="info-panel">
            <div class="legend-item">
                <div class="color-box" style="background: #87CEFA;"></div>
                <div><strong>Kiri (Larutan):</strong> Tembus Cahaya</div>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #F0E68C;"></div>
                <div><strong>Tengah (Koloid):</strong> Efek Tyndall</div>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #D2B48C;"></div>
                <div><strong>Kanan (Suspensi):</strong> Mengendap & Menghalangi Cahaya</div>
            </div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Memuat AR...</p>
    </div>

    <!-- AR Scene -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="antialias: true; alpha: true; precision: medium;"
        vr-mode-ui="enabled: false">

        <!-- Hiro Marker -->
        <a-marker preset="hiro" id="marker">
            
            <!-- Base Platform -->
            <a-cylinder position="0 0 0" radius="2.5" height="0.05" color="#1a1a1a" opacity="0.8"></a-cylinder>
            <a-text value="Sinar Bergerak Ke Kanan ---->" position="-0.8 0.1 1.5" rotation="-90 0 0" color="#ffffff" scale="0.8 0.8 0.8" font="exo2bold"></a-text>

            <!-- Light Source (Flashlight/Laser) -->
            <a-entity position="-2.5 0.5 0">
                <!-- Laser Device -->
                <a-box width="0.8" height="0.3" depth="0.3" color="#333" position="0 0 0"></a-box>
                <a-cylinder radius="0.1" height="0.1" color="#888" rotation="0 0 -90" position="0.45 0 0"></a-cylinder>
                <a-text value="SENTER" position="-0.3 0.2 0.16" scale="0.5 0.5 0.5" color="#fff"></a-text>
                
                <!-- Laser Beam (to Beaker 1) -->
                <a-cylinder radius="0.02" height="0.75" color="#ff0000" rotation="0 0 -90" position="0.875 0 0" opacity="0.6" material="shader: flat;"></a-cylinder>
            </a-entity>

            <!-- Beaker 1: Solution (Left) -->
            <a-entity id="beaker-solution" position="-1.2 0.05 0" scale="0.6 0.6 0.6">
                <!-- Glass Shell -->
                <a-cylinder radius="0.8" height="1.5" position="0 0.75 0" color="#ffffff" opacity="0.2" material="side: double; transparent: true; metalness: 0.8; roughness: 0.1;" open-ended="true"></a-cylinder>
                <a-cylinder radius="0.8" height="0.05" position="0 0.025 0" color="#ffffff" opacity="0.3" material="metalness: 0.8; roughness: 0.1;"></a-cylinder>
                <!-- Liquid -->
                <a-cylinder id="liquid-solution" radius="0.78" height="1.2" position="0 0.6 0" color="#87CEFA" opacity="0.3" material="transparent: true;"></a-cylinder>
                <!-- Invisible Tyndall beam inside -->
                <a-cylinder radius="0.04" height="1.56" color="#ff0000" rotation="0 0 -90" position="0 0.75 0" opacity="0.0" material="shader: flat; side: double;"></a-cylinder>
                <!-- Particles Container -->
                <a-entity id="particles-solution" position="0 0.6 0"></a-entity>
                <!-- Label -->
                <a-text value="Larutan Sejati" position="-0.7 -0.15 1.0" rotation="-90 0 0" color="#fff" scale="1.5 1.5 1.5"></a-text>
            </a-entity>

            <!-- Laser Beam (1 to 2) -->
            <a-cylinder radius="0.02" height="0.56" color="#ff0000" rotation="0 0 -90" position="-0.6 0.5 0" opacity="0.6" material="shader: flat;"></a-cylinder>

            <!-- Beaker 2: Colloid (Center) -->
            <a-entity id="beaker-colloid" position="0 0.05 0" scale="0.6 0.6 0.6">
                <!-- Glass Shell -->
                <a-cylinder radius="0.8" height="1.5" position="0 0.75 0" color="#ffffff" opacity="0.2" material="side: double; transparent: true; metalness: 0.8; roughness: 0.1;" open-ended="true"></a-cylinder>
                <a-cylinder radius="0.8" height="0.05" position="0 0.025 0" color="#ffffff" opacity="0.3" material="metalness: 0.8; roughness: 0.1;"></a-cylinder>
                <!-- Liquid -->
                <a-cylinder id="liquid-colloid" radius="0.78" height="1.2" position="0 0.6 0" color="#F0E68C" opacity="0.7" material="transparent: true;"></a-cylinder>
                <!-- Visible Tyndall beam inside -->
                <a-cylinder radius="0.04" height="1.56" color="#ff0000" rotation="0 0 -90" position="0 0.75 0" opacity="0.8" material="shader: flat; side: double;"></a-cylinder>
                <!-- Particles Container -->
                <a-entity id="particles-colloid" position="0 0.6 0"></a-entity>
                <!-- Label -->
                <a-text value="Koloid" position="-0.4 -0.15 1.0" rotation="-90 0 0" color="#fff" scale="1.5 1.5 1.5"></a-text>
            </a-entity>

            <!-- Laser Beam (2 to 3) -->
            <!-- Beam is slightly weaker because it passed through colloid -->
            <a-cylinder radius="0.02" height="0.56" color="#ff0000" rotation="0 0 -90" position="0.6 0.5 0" opacity="0.4" material="shader: flat;"></a-cylinder>

            <!-- Beaker 3: Suspension (Right) -->
            <a-entity id="beaker-suspension" position="1.2 0.05 0" scale="0.6 0.6 0.6">
                <!-- Glass Shell -->
                <a-cylinder radius="0.8" height="1.5" position="0 0.75 0" color="#ffffff" opacity="0.2" material="side: double; transparent: true; metalness: 0.8; roughness: 0.1;" open-ended="true"></a-cylinder>
                <a-cylinder radius="0.8" height="0.05" position="0 0.025 0" color="#ffffff" opacity="0.3" material="metalness: 0.8; roughness: 0.1;"></a-cylinder>
                <!-- Liquid -->
                <a-cylinder id="liquid-suspension" radius="0.78" height="1.2" position="0 0.6 0" color="#D2B48C" opacity="0.9" material="transparent: true;"></a-cylinder>
                <!-- Dimly visible / dispersed beam inside -->
                <a-cylinder radius="0.05" height="1.56" color="#ff0000" rotation="0 0 -90" position="0 0.75 0" opacity="0.15" material="shader: flat; side: double;"></a-cylinder>
                <!-- Particles Container -->
                <a-entity id="particles-suspension" position="0 0.6 0"></a-entity>
                <!-- Label -->
                <a-text value="Suspensi" position="-0.5 -0.15 1.0" rotation="-90 0 0" color="#fff" scale="1.5 1.5 1.5"></a-text>
            </a-entity>

            <!-- Laser Beam Out (Blocked/Doesn't exist) -->
            <!-- We will not put a beam exiting the suspension because it gets blocked by the particles -->

        </a-marker>

        <!-- Camera -->
        <a-entity camera></a-entity>

    </a-scene>

    <script src="js/app.js"></script>
</body>
</html>
