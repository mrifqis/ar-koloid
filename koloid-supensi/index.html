<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <!-- Viewport diperbaiki -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">

    <title>AR Campuran: Larutan, Koloid, Suspensi</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- A-Frame Look-at Component -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- UI Overlay -->
    <div id="ui-container">
        <div class="header">
            <h1>Perbandingan Campuran</h1>
            <p>Arahkan kamera ke marker Hiro</p>
        </div>

        <div id="info-panel" class="info-panel">
            <div class="legend-item">
                <div class="color-box" style="background: #87CEFA;"></div>
                <div><strong>Kiri:</strong> Larutan sejati, cahaya tembus</div>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #F0E68C;"></div>
                <div><strong>Tengah:</strong> Koloid, terjadi efek Tyndall</div>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #D2B48C;"></div>
                <div><strong>Kanan:</strong> Suspensi, partikel mengendap</div>
            </div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Memuat AR...</p>
    </div>

    <!-- AR Scene -->
    <a-scene
    embedded
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;
          trackingMethod: best;
          sourceWidth: 640;
          sourceHeight: 480;
          displayWidth: 640;
          displayHeight: 480;"
          renderer="antialias: true; alpha: true; precision: medium;"
          vr-mode-ui="enabled: false">

        <!-- Hiro Marker -->
        <a-marker preset="hiro" id="marker">

            <!-- Semua objek AR dibungkus supaya mudah dikecilkan -->
            <a-entity id="ar-content" scale="0.55 0.55 0.55">

                <!-- Base Platform -->
                <a-cylinder
                    position="0 0 0"
                    radius="2.1"
                    height="0.05"
                    color="#1a1a1a"
                    opacity="0.8">
                </a-cylinder>

                <a-text
                    value="Sinar bergerak ke kanan"
                    position="-0.85 0.08 1.35"
                    rotation="-90 0 0"
                    color="#ffffff"
                    scale="0.55 0.55 0.55"
                    align="center">
                </a-text>

                <!-- Light Source / Senter -->
                <a-entity position="-2.05 0.45 0">

                    <a-box
                        width="0.65"
                        height="0.25"
                        depth="0.25"
                        color="#333333"
                        position="0 0 0">
                    </a-box>

                    <a-cylinder
                        radius="0.08"
                        height="0.1"
                        color="#888888"
                        rotation="0 0 -90"
                        position="0.38 0 0">
                    </a-cylinder>

                    <a-text
                        value="SENTER"
                        position="-0.27 0.18 0.15"
                        scale="0.35 0.35 0.35"
                        color="#ffffff"
                        align="center">
                    </a-text>

                    <!-- Laser Beam dari senter ke gelas 1 -->
                    <a-cylinder
                        radius="0.018"
                        height="0.65"
                        color="#ff0000"
                        rotation="0 0 -90"
                        position="0.75 0 0"
                        opacity="0.65"
                        material="shader: flat;">
                    </a-cylinder>

                </a-entity>

                <!-- Beaker 1: Larutan Sejati -->
                <a-entity id="beaker-solution" position="-1.0 0.05 0" scale="0.48 0.48 0.48">

                    <!-- Glass Shell -->
                    <a-cylinder
                        radius="0.8"
                        height="1.5"
                        position="0 0.75 0"
                        color="#ffffff"
                        opacity="0.22"
                        open-ended="true"
                        material="side: double; transparent: true; metalness: 0.4; roughness: 0.15;">
                    </a-cylinder>

                    <a-cylinder
                        radius="0.8"
                        height="0.05"
                        position="0 0.025 0"
                        color="#ffffff"
                        opacity="0.3"
                        material="transparent: true;">
                    </a-cylinder>

                    <!-- Cairan -->
                    <a-cylinder
                        id="liquid-solution"
                        radius="0.78"
                        height="1.2"
                        position="0 0.6 0"
                        color="#87CEFA"
                        opacity="0.3"
                        material="transparent: true;">
                    </a-cylinder>

                    <!-- Sinar dalam larutan hampir tidak tampak -->
                    <a-cylinder
                        radius="0.035"
                        height="1.56"
                        color="#ff0000"
                        rotation="0 0 -90"
                        position="0 0.75 0"
                        opacity="0.08"
                        material="shader: flat; side: double;">
                    </a-cylinder>

                    <!-- Particles Container -->
                    <a-entity id="particles-solution" position="0 0.6 0"></a-entity>

                    <!-- Label -->
                    <a-text
                        value="Larutan"
                        position="-0.55 -0.2 1.0"
                        rotation="-90 0 0"
                        color="#ffffff"
                        scale="0.95 0.95 0.95"
                        align="center">
                    </a-text>

                </a-entity>

                <!-- Laser Beam dari larutan ke koloid -->
                <a-cylinder
                    radius="0.018"
                    height="0.52"
                    color="#ff0000"
                    rotation="0 0 -90"
                    position="-0.5 0.45 0"
                    opacity="0.6"
                    material="shader: flat;">
                </a-cylinder>

                <!-- Beaker 2: Koloid -->
                <a-entity id="beaker-colloid" position="0 0.05 0" scale="0.48 0.48 0.48">

                    <!-- Glass Shell -->
                    <a-cylinder
                        radius="0.8"
                        height="1.5"
                        position="0 0.75 0"
                        color="#ffffff"
                        opacity="0.22"
                        open-ended="true"
                        material="side: double; transparent: true; metalness: 0.4; roughness: 0.15;">
                    </a-cylinder>

                    <a-cylinder
                        radius="0.8"
                        height="0.05"
                        position="0 0.025 0"
                        color="#ffffff"
                        opacity="0.3"
                        material="transparent: true;">
                    </a-cylinder>

                    <!-- Cairan -->
                    <a-cylinder
                        id="liquid-colloid"
                        radius="0.78"
                        height="1.2"
                        position="0 0.6 0"
                        color="#F0E68C"
                        opacity="0.68"
                        material="transparent: true;">
                    </a-cylinder>

                    <!-- Sinar Tyndall tampak jelas -->
                    <a-cylinder
                        radius="0.045"
                        height="1.56"
                        color="#ff0000"
                        rotation="0 0 -90"
                        position="0 0.75 0"
                        opacity="0.85"
                        material="shader: flat; side: double;">
                    </a-cylinder>

                    <!-- Hamburan cahaya -->
                    <a-sphere
                        position="0 0.75 0"
                        radius="0.55"
                        color="#fff2a8"
                        opacity="0.18"
                        material="transparent: true; shader: flat;">
                    </a-sphere>

                    <!-- Particles Container -->
                    <a-entity id="particles-colloid" position="0 0.6 0"></a-entity>

                    <!-- Label -->
                    <a-text
                        value="Koloid"
                        position="-0.45 -0.2 1.0"
                        rotation="-90 0 0"
                        color="#ffffff"
                        scale="0.95 0.95 0.95"
                        align="center">
                    </a-text>

                </a-entity>

                <!-- Laser Beam dari koloid ke suspensi -->
                <a-cylinder
                    radius="0.018"
                    height="0.52"
                    color="#ff0000"
                    rotation="0 0 -90"
                    position="0.5 0.45 0"
                    opacity="0.38"
                    material="shader: flat;">
                </a-cylinder>

                <!-- Beaker 3: Suspensi -->
                <a-entity id="beaker-suspension" position="1.0 0.05 0" scale="0.48 0.48 0.48">

                    <!-- Glass Shell -->
                    <a-cylinder
                        radius="0.8"
                        height="1.5"
                        position="0 0.75 0"
                        color="#ffffff"
                        opacity="0.22"
                        open-ended="true"
                        material="side: double; transparent: true; metalness: 0.4; roughness: 0.15;">
                    </a-cylinder>

                    <a-cylinder
                        radius="0.8"
                        height="0.05"
                        position="0 0.025 0"
                        color="#ffffff"
                        opacity="0.3"
                        material="transparent: true;">
                    </a-cylinder>

                    <!-- Cairan suspensi -->
                    <a-cylinder
                        id="liquid-suspension"
                        radius="0.78"
                        height="1.2"
                        position="0 0.6 0"
                        color="#D2B48C"
                        opacity="0.9"
                        material="transparent: true;">
                    </a-cylinder>

                    <!-- Endapan di bawah -->
                    <a-cylinder
                        radius="0.72"
                        height="0.18"
                        position="0 0.12 0"
                        color="#8B5A2B"
                        opacity="0.95">
                    </a-cylinder>

                    <!-- Sinar melemah / terhalang -->
                    <a-cylinder
                        radius="0.05"
                        height="1.1"
                        color="#ff0000"
                        rotation="0 0 -90"
                        position="-0.15 0.75 0"
                        opacity="0.16"
                        material="shader: flat; side: double;">
                    </a-cylinder>

                    <!-- Particles Container -->
                    <a-entity id="particles-suspension" position="0 0.6 0"></a-entity>

                    <!-- Label -->
                    <a-text
                        value="Suspensi"
                        position="-0.55 -0.2 1.0"
                        rotation="-90 0 0"
                        color="#ffffff"
                        scale="0.95 0.95 0.95"
                        align="center">
                    </a-text>

                </a-entity>

            </a-entity>

        </a-marker>

        <!-- Camera -->
        <a-entity camera></a-entity>

    </a-scene>

    <!-- Script untuk menyembunyikan loading dan mengatur skala Android/iPhone -->
    <script>
        window.addEventListener("load", function () {
            const loading = document.querySelector("#loading");
            const arContent = document.querySelector("#ar-content");

            if (loading) {
                setTimeout(function () {
                    loading.style.display = "none";
                }, 1200);
            }

            if (arContent) {
                const isAndroid = /Android/i.test(navigator.userAgent);
                const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

                if (isAndroid) {
                    // Android biasanya perlu lebih kecil
                    arContent.setAttribute("scale", "0.45 0.45 0.45");
                } else if (isIOS) {
                    // iPhone biasanya masih aman di ukuran ini
                    arContent.setAttribute("scale", "0.55 0.55 0.55");
                } else {
                    arContent.setAttribute("scale", "0.50 0.50 0.50");
                }
            }
        });
    </script>

    <!-- File JS lama tetap boleh dipakai untuk partikel/animasi -->
    <script src="js/app.js"></script>

</body>
</html>
