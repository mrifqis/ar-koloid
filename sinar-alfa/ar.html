<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Percobaan Rutherford</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .back-button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1000;
        }
    </style>
    <script>
        AFRAME.registerComponent('rutherford-experiment', {
            init: function () {
                this.particles = [];
                this.particleCount = 50;
                this.sourcePos = new THREE.Vector3(0, 0.5, 1.2);
                this.foilPos = new THREE.Vector3(0, 0.5, 0);

                for (let i = 0; i < this.particleCount; i++) {
                    let el = document.createElement('a-sphere');
                    el.setAttribute('radius', '0.015');
                    el.setAttribute('color', '#ff3333');
                    el.setAttribute('material', 'shader: flat');
                    
                    let type = Math.random();
                    let endPos = new THREE.Vector3();
                    let distance = 1.0; // radius of the screen
                    
                    if (type < 0.85) {
                        // Straight (most particles)
                        let angle = (Math.random() - 0.5) * 10; // -5 to 5 degrees
                        let rad = angle * Math.PI / 180;
                        endPos.set(distance * Math.sin(rad), 0.5, -distance * Math.cos(rad));
                    } else if (type < 0.98) {
                        // Deflected
                        let angle = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 60 + 15); // 15 to 75 degrees
                        let rad = angle * Math.PI / 180;
                        endPos.set(distance * Math.sin(rad), 0.5, -distance * Math.cos(rad));
                    } else {
                        // Bounced back
                        let angle = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 45 + 120); // 120 to 165 degrees
                        let rad = angle * Math.PI / 180;
                        endPos.set(distance * Math.sin(rad), 0.5, -distance * Math.cos(rad));
                    }

                    this.el.appendChild(el);
                    
                    this.particles.push({
                        el: el,
                        startPos: new THREE.Vector3(this.sourcePos.x + (Math.random()-0.5)*0.05, this.sourcePos.y, this.sourcePos.z),
                        midPos: new THREE.Vector3(this.foilPos.x + (Math.random()-0.5)*0.05, this.foilPos.y, this.foilPos.z),
                        endPos: endPos,
                        progress: -Math.random() * 3, // Negative progress for staggering
                        speed: 0.8 + Math.random() * 0.4
                    });
                }
            },
            tick: function (time, timeDelta) {
                let dt = timeDelta / 1000;
                // Cap dt to prevent huge jumps if tab is inactive
                if (dt > 0.1) dt = 0.1;

                this.particles.forEach(p => {
                    let oldProgress = p.progress;
                    p.progress += dt * p.speed;
                    
                    if (p.progress < 0) {
                        p.el.setAttribute('visible', false);
                    } else if (p.progress <= 0.5) {
                        p.el.setAttribute('visible', true);
                        let t = p.progress * 2; 
                        let currentPos = new THREE.Vector3().lerpVectors(p.startPos, p.midPos, t);
                        p.el.setAttribute('position', currentPos);
                    } else if (p.progress <= 1.0) {
                        let t = (p.progress - 0.5) * 2; 
                        let currentPos = new THREE.Vector3().lerpVectors(p.midPos, p.endPos, t);
                        p.el.setAttribute('position', currentPos);
                    } else {
                        if (oldProgress <= 1.0) {
                            // Hit the screen!
                            let flash = document.createElement('a-sphere');
                            flash.setAttribute('radius', '0.03');
                            flash.setAttribute('color', '#aaffaa'); // Glowing green on zinc sulfide
                            flash.setAttribute('material', 'shader: flat');
                            flash.setAttribute('position', p.endPos);
                            flash.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 400; easing: easeOutQuad');
                            this.el.appendChild(flash);
                            setTimeout(() => {
                                if (flash.parentNode) {
                                    flash.parentNode.removeChild(flash);
                                }
                            }, 400);
                        }
                        // Reset particle
                        p.progress = -Math.random() * 2;
                    }
                });
            }
        });
    </script>
</head>
<body style="margin : 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-marker preset="hiro">
            
            <a-entity rutherford-experiment></a-entity>

            <!-- Alpha Source -->
            <a-box position="0 0.5 1.3" depth="0.3" height="0.3" width="0.3" color="#555" material="roughness: 0.8"></a-box>
            <a-cylinder position="0 0.5 1.1" radius="0.05" height="0.1" rotation="90 0 0" color="#333"></a-cylinder>
            <a-text value="Sumber Alpha" position="0 0.8 1.3" align="center" scale="0.5 0.5 0.5" color="#fff" look-at="[camera]"></a-text>

            <!-- Gold Foil -->
            <a-box position="0 0.5 0" depth="0.005" height="0.3" width="0.3" color="#FFD700" material="metalness: 0.8; roughness: 0.2; transparent: true; opacity: 0.9"></a-box>
            <a-text value="Lempeng Emas" position="0 0.8 0" align="center" scale="0.5 0.5 0.5" color="#FFD700" look-at="[camera]"></a-text>

            <!-- Fluorescent Screen -->
            <!-- We use an open-ended cylinder. AR.js default axis is Y. -->
            <!-- Rotation around Y axis by 180 degrees positions the gap towards the alpha source. -->
            <!-- Wait, thetaLength=300 means it covers 300 degrees out of 360, leaving 60 degree gap. -->
            <!-- The gap is usually around the positive Z axis (if starting from X axis, it depends on rotation). -->
            <a-cylinder position="0 0.5 0" 
                        radius="1.0" 
                        height="0.4" 
                        open-ended="true" 
                        side="double"
                        material="color: #88ccff; transparent: true; opacity: 0.3; side: double; metalness: 0.2"
                        theta-start="120"
                        theta-length="300">
            </a-cylinder>
            <a-text value="Layar Zink Sulfida" position="0 0.9 -1" align="center" scale="0.5 0.5 0.5" color="#88ccff" look-at="[camera]"></a-text>

        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <a href="index.html" class="back-button">← Kembali</a>

    <!-- A-Frame Look-at component for text to always face camera -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</body>
</html>
