<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Percobaan Sinar Katode Thomson</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #333; }
        p { margin: 0; font-size: 0.9rem; color: #555; }
        .controls { margin-top: 15px; }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #45a049; }
        .print-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background-color: #2196F3;
        }
        .print-btn:hover { background-color: #1976D2; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- UI Overlay -->
    <button class="print-btn" onclick="window.open('marker.html', '_blank')">Cetak Marker AR</button>
    
    <div id="ui-container">
        <h1>Percobaan Sinar Katode Thomson</h1>
        <p>Arahkan kamera ke marker "Hiro" untuk melihat model 3D tabung sinar katode.</p>
        <div class="controls">
            <button id="toggleVoltage">Nyalakan Tegangan Pelat</button>
        </div>
    </div>

    <!-- AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-marker preset="hiro">
            
            <!-- Model Tabung Sinar Katode Thomson -->
            <a-entity position="0 0.5 0" scale="0.8 0.8 0.8" rotation="0 0 0">
                
                <!-- Label Judul -->
                <a-text value="Model Atom Thomson (Sinar Katode)" position="0 1.5 0" align="center" color="#ffffff" scale="0.8 0.8 0.8" geometry="primitive: plane; height: auto; width: auto" material="color: #333; opacity: 0.7"></a-text>

                <!-- Kaca Tabung Sinar Katode -->
                <a-cylinder radius="0.5" height="3" rotation="0 0 90" position="0 0 0" material="color: #a3d8f4; opacity: 0.2; transparent: true; side: double"></a-cylinder>
                <a-sphere radius="0.5" position="-1.5 0 0" material="color: #a3d8f4; opacity: 0.2; transparent: true; side: double"></a-sphere>
                <!-- Layar Pendar (Kanan) -->
                <a-sphere radius="0.7" position="1.3 0 0" scale="0.5 1 1" material="color: #a3d8f4; opacity: 0.2; transparent: true; side: double"></a-sphere>
                <a-cylinder radius="0.6" height="0.1" rotation="0 0 90" position="1.65 0 0" material="color: #2e8b57"></a-cylinder>
                <a-text value="Layar Pendar" position="1.8 0 0" rotation="0 0 0" scale="0.4 0.4 0.4" align="left" color="#000"></a-text>

                <!-- Katode (Kiri) -->
                <a-cylinder radius="0.3" height="0.1" rotation="0 0 90" position="-1.4 0 0" color="#888888"></a-cylinder>
                <a-text value="Katode (-)" position="-1.4 0.5 0" scale="0.4 0.4 0.4" align="center" color="#ff4444"></a-text>

                <!-- Anode (Tengah, dengan lubang) -->
                <!-- Menggunakan 2 silinder setengah lingkaran atau cincin -->
                <a-torus radius="0.3" radius-tubular="0.05" rotation="0 90 0" position="-0.5 0 0" color="#888888"></a-torus>
                <a-text value="Anode (+)" position="-0.5 0.5 0" scale="0.4 0.4 0.4" align="center" color="#4444ff"></a-text>

                <!-- Pelat Pembelok Listrik -->
                <!-- Pelat Atas (+) -->
                <a-box width="0.8" height="0.05" depth="0.4" position="0.3 0.35 0" color="#ff4444"></a-box>
                <a-text value="Pelat Positif (+)" position="0.3 0.5 0" scale="0.3 0.3 0.3" align="center" color="#ff4444"></a-text>
                
                <!-- Pelat Bawah (-) -->
                <a-box width="0.8" height="0.05" depth="0.4" position="0.3 -0.35 0" color="#4444ff"></a-box>
                <a-text value="Pelat Negatif (-)" position="0.3 -0.5 0" scale="0.3 0.3 0.3" align="center" color="#4444ff"></a-text>

                <!-- Sinar Katode (Lurus) - Akan disembunyikan saat teganggan nyala -->
                <a-entity id="ray-straight" visible="true">
                    <a-cylinder radius="0.015" height="3" rotation="0 0 90" position="0.1 0 0" material="color: #00ff00; emissive: #00ff00; emissiveIntensity: 1"></a-cylinder>
                    <!-- Titik Pendar Lurus -->
                    <a-sphere radius="0.05" position="1.6 0 0" material="color: #00ff00; emissive: #00ff00; emissiveIntensity: 2"></a-sphere>
                </a-entity>

                <!-- Sinar Katode (Membelok ke atas mendekati positif) -->
                <a-entity id="ray-deflected" visible="false">
                    <!-- Garis Lurus Awal -->
                    <a-cylinder radius="0.015" height="1.6" rotation="0 0 90" position="-0.6 0 0" material="color: #00ff00; emissive: #00ff00; emissiveIntensity: 1"></a-cylinder>
                    <!-- Garis Membelok -->
                    <a-cylinder radius="0.015" height="1.5" rotation="0 0 75" position="0.9 0.2 0" material="color: #00ff00; emissive: #00ff00; emissiveIntensity: 1"></a-cylinder>
                    <!-- Titik Pendar Membelok -->
                    <a-sphere radius="0.05" position="1.58 0.4 0" material="color: #00ff00; emissive: #00ff00; emissiveIntensity: 2"></a-sphere>
                </a-entity>

                <!-- Partikel Elektron Animasi -->
                <a-sphere id="electron" radius="0.04" position="-1.4 0 0" material="color: #ffffff; emissive: #ffffff; emissiveIntensity: 1">
                    <a-animation attribute="position" from="-1.4 0 0" to="1.6 0 0" dur="2000" repeat="indefinite" easing="linear" id="anim-straight"></a-animation>
                    <a-animation attribute="position" from="-1.4 0 0" to="1.58 0.4 0" dur="2000" repeat="indefinite" easing="linear" id="anim-deflected" begin="never"></a-animation>
                </a-sphere>

                <script>
                    // Animasi manual menggunakan komponen AFRAME agar lebih terjamin (a-animation sudah deprecated di versi AFrame baru)
                    AFRAME.registerComponent('electron-movement', {
                        schema: {
                            deflected: {type: 'boolean', default: false}
                        },
                        init: function () {
                            this.time = 0;
                            this.startX = -1.4;
                            this.speed = 1.5; // units per second
                        },
                        tick: function (time, timeDelta) {
                            this.time += timeDelta / 1000;
                            let currentX = this.startX + (this.time * this.speed);
                            let currentY = 0;
                            
                            // Reset jika melewati batas
                            if (currentX > 1.6) {
                                this.time = 0;
                                currentX = this.startX;
                            }

                            // Jika membelok, setelah melewati posisi x = 0.2 (masuk area pelat), y akan naik
                            if (this.data.deflected) {
                                if (currentX > 0.2) {
                                    // Y naik perlahan
                                    currentY = (currentX - 0.2) * 0.3; // gradien kemiringan
                                }
                            }

                            this.el.setAttribute('position', `${currentX} ${currentY} 0`);
                        }
                    });

                    // Terapkan komponen ke elektron
                    document.querySelector('#electron').setAttribute('electron-movement', 'deflected: false');
                </script>

            </a-entity>
        </a-marker>
        
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let isDeflected = false;
        const btnToggle = document.getElementById('toggleVoltage');
        const rayStraight = document.getElementById('ray-straight');
        const rayDeflected = document.getElementById('ray-deflected');
        const electron = document.getElementById('electron');

        btnToggle.addEventListener('click', () => {
            isDeflected = !isDeflected;
            
            if (isDeflected) {
                btnToggle.textContent = 'Matikan Tegangan Pelat';
                btnToggle.style.backgroundColor = '#f44336';
                rayStraight.setAttribute('visible', 'false');
                rayDeflected.setAttribute('visible', 'true');
                electron.setAttribute('electron-movement', 'deflected: true');
            } else {
                btnToggle.textContent = 'Nyalakan Tegangan Pelat';
                btnToggle.style.backgroundColor = '#4CAF50';
                rayStraight.setAttribute('visible', 'true');
                rayDeflected.setAttribute('visible', 'false');
                electron.setAttribute('electron-movement', 'deflected: false');
            }
        });
    </script>
</body>
</html>
