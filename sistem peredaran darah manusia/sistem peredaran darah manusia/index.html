<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Sistem Peredaran Darah Manusia</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Look-at Component untuk teks 3D agar selalu menghadap kamera -->
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a;
        }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        
        h1 { 
            margin: 0 0 8px 0; 
            font-size: 1.5rem; 
            background: linear-gradient(135deg, #ff1744, #ff80ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        
        p { 
            margin: 0; 
            font-size: 0.95rem; 
            color: #cbd5e1; 
            line-height: 1.5;
            font-weight: 400;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 18px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }
        .legend-item:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.1);
        }
        
        .color-box { 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        
        .red-blood { background: #ff1744; box-shadow: 0 0 12px #ff1744; }
        .blue-blood { background: #00d2ff; box-shadow: 0 0 12px #00d2ff; }
        
        #marker-container {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            width: 110px;
        }
        
        #marker-container p {
            color: #f1f5f9;
        }

        #marker-title {
            margin: 0 0 8px 0; 
            font-size: 13px; 
            font-weight: 800; 
            letter-spacing: 0.5px;
        }

        #marker-img { 
            width: 80px; 
            height: 80px; 
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }
        #marker-img:hover {
            transform: scale(1.05);
        }
        
        #marker-desc {
            margin: 8px 0 0 0; 
            font-size: 10px; 
            color: #94a3b8;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 23, 68, 0.2);
            border-top-color: #ff1744;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <h2 style="font-weight: 600; font-family: 'Outfit'; margin:0;">Memuat Lingkungan AR...</h2>
        <p style="margin-top: 10px; color: #94a3b8;">Izinkan akses kamera saat diminta browser</p>
    </div>

    <!-- UI Overlay Bawah -->
    <div id="ui-container" class="glass-panel">
        <h1>Sistem Peredaran Darah</h1>
        <p>Arahkan kamera ke marker Hiro untuk melihat simulasi 3D proses sirkulasi darah pada manusia.</p>
        <div class="legend">
            <div class="legend-item">
                <div class="color-box red-blood"></div> Darah Kaya O₂
            </div>
            <div class="legend-item">
                <div class="color-box blue-blood"></div> Darah Kaya CO₂
            </div>
        </div>
    </div>

    <!-- Marker Preview -->
    <div id="marker-container" class="glass-panel">
        <p id="marker-title">MARKER</p>
        <img id="marker-img" src="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" alt="Hiro Marker">
        <p id="marker-desc">Scan / Print</p>
    </div>

    <!-- AR Scene (A-Frame + AR.js) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" 
             renderer="colorManagement: true, antialias: true; alpha: true"
             vr-mode-ui="enabled: false">
        
        <!-- Pencahayaan -->
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" position="2 4 3" intensity="0.9" color="#ffffff" castShadow="true"></a-light>

        <!-- Deteksi Marker Hiro -->
        <a-marker preset="hiro">
            
            <!-- Grup Utama: Dirotasi agar model tegak berdiri di atas kertas marker -->
            <a-entity scale="0.6 0.6 0.6" position="0 0.2 0" rotation="-90 0 0">
                
                <!-- 1. JANTUNG (Pusat Animasi Berdetak) -->
                <a-entity position="0 0 0">
                    <!-- Bilik (Ventrikel) -->
                    <a-sphere radius="0.5" color="#ff1744" material="roughness: 0.3; metalness: 0.1; emissive: #ff1744; emissiveIntensity: 0.3"
                        animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; dur: 600; loop: true; easing: easeInOutSine">
                    </a-sphere>
                    <!-- Serambi (Atrium) -->
                    <a-sphere radius="0.3" position="-0.3 0.35 0" color="#d50000"></a-sphere>
                    <a-sphere radius="0.3" position="0.3 0.35 0" color="#d50000"></a-sphere>
                    
                    <a-text value="JANTUNG" position="0 -0.85 0" align="center" color="#ffffff" scale="1.3 1.3 1.3" font="kelsonsans" look-at="[camera]"></a-text>
                </a-entity>

                <!-- 2. PARU-PARU (Bagian Atas - Animasi Bernapas) -->
                <a-entity position="0 2.5 0">
                    <!-- Paru Kanan & Kiri -->
                    <a-sphere radius="0.65" position="-0.75 0 0" color="#ff80ab" material="opacity: 0.85; transparent: true; roughness: 0.5"
                        animation="property: scale; to: 1.08 1.08 1.08; dir: alternate; dur: 2500; loop: true; easing: easeInOutQuad"></a-sphere>
                    <a-sphere radius="0.65" position="0.75 0 0" color="#ff80ab" material="opacity: 0.85; transparent: true; roughness: 0.5"
                        animation="property: scale; to: 1.08 1.08 1.08; dir: alternate; dur: 2500; loop: true; easing: easeInOutQuad"></a-sphere>
                    
                    <!-- Trakea -->
                    <a-cylinder radius="0.12" height="0.8" position="0 0.8 0" color="#f5f6fa"></a-cylinder>
                    
                    <a-text value="PARU-PARU" position="0 1.5 0" align="center" color="#ffffff" scale="1.3 1.3 1.3" font="kelsonsans" look-at="[camera]"></a-text>
                </a-entity>

                <!-- 3. SELURUH TUBUH (Bagian Bawah) -->
                <a-entity position="0 -2.5 0">
                    <a-box width="2.2" height="0.8" depth="0.6" color="#ffc400" material="roughness: 0.6; opacity: 0.95; borderRadius: 0.2"></a-box>
                    
                    <a-text value="SELURUH TUBUH" position="0 -0.9 0" align="center" color="#ffffff" scale="1.3 1.3 1.3" font="kelsonsans" look-at="[camera]"></a-text>
                </a-entity>

                <!-- 4. PEMBULUH DARAH (Jalur penghubung sirkulasi) -->
                <!-- Arteri Pulmonalis (Jantung ke Paru - Membawa darah kotor/CO2) -->
                <a-cylinder position="-0.55 1.25 0" rotation="0 0 16" height="1.6" radius="0.06" color="#00d2ff" material="opacity: 0.6; transparent: true"></a-cylinder>
                
                <!-- Vena Pulmonalis (Paru ke Jantung - Membawa darah bersih/O2) -->
                <a-cylinder position="0.55 1.25 0" rotation="0 0 -16" height="1.6" radius="0.06" color="#ff1744" material="opacity: 0.6; transparent: true"></a-cylinder>
                
                <!-- Aorta (Jantung ke Tubuh - Membawa darah bersih/O2) -->
                <a-cylinder position="0.6 -1.25 0" rotation="0 0 -14" height="1.75" radius="0.06" color="#ff1744" material="opacity: 0.6; transparent: true"></a-cylinder>
                
                <!-- Vena Cava (Tubuh ke Jantung - Membawa darah kotor/CO2) -->
                <a-cylinder position="-0.6 -1.25 0" rotation="0 0 14" height="1.75" radius="0.06" color="#00d2ff" material="opacity: 0.6; transparent: true"></a-cylinder>

                <!-- 5. ANIMASI ALIRAN SEL DARAH (Partikel Bergerak - Kecepatan Sedang) -->
                
                <!-- Peredaran Darah Kecil: Jantung ke Paru-paru (Darah Biru) -->
                <a-sphere radius="0.12" color="#00d2ff" material="emissive: #00d2ff; emissiveIntensity: 0.6" position="-0.35 0.5 0"
                    animation="property: position; from: -0.35 0.5 0; to: -0.75 2.0 0; dur: 3000; loop: true; easing: linear"></a-sphere>
                <a-sphere radius="0.12" color="#00d2ff" material="emissive: #00d2ff; emissiveIntensity: 0.6" position="-0.35 0.5 0"
                    animation="property: position; from: -0.35 0.5 0; to: -0.75 2.0 0; dur: 3000; delay: 1500; loop: true; easing: linear"></a-sphere>

                <!-- Peredaran Darah Kecil: Paru-paru ke Jantung (Darah Merah) -->
                <a-sphere radius="0.12" color="#ff1744" material="emissive: #ff1744; emissiveIntensity: 0.6" position="0.75 2.0 0"
                    animation="property: position; from: 0.75 2.0 0; to: 0.35 0.5 0; dur: 3000; loop: true; easing: linear"></a-sphere>
                <a-sphere radius="0.12" color="#ff1744" material="emissive: #ff1744; emissiveIntensity: 0.6" position="0.75 2.0 0"
                    animation="property: position; from: 0.75 2.0 0; to: 0.35 0.5 0; dur: 3000; delay: 1500; loop: true; easing: linear"></a-sphere>

                <!-- Peredaran Darah Besar: Jantung ke Seluruh Tubuh (Darah Merah) -->
                <a-sphere radius="0.12" color="#ff1744" material="emissive: #ff1744; emissiveIntensity: 0.6" position="0.45 -0.4 0"
                    animation="property: position; from: 0.45 -0.4 0; to: 0.85 -2.1 0; dur: 4000; loop: true; easing: linear"></a-sphere>
                <a-sphere radius="0.12" color="#ff1744" material="emissive: #ff1744; emissiveIntensity: 0.6" position="0.45 -0.4 0"
                    animation="property: position; from: 0.45 -0.4 0; to: 0.85 -2.1 0; dur: 4000; delay: 2000; loop: true; easing: linear"></a-sphere>

                <!-- Peredaran Darah Besar: Seluruh Tubuh ke Jantung (Darah Biru) -->
                <a-sphere radius="0.12" color="#00d2ff" material="emissive: #00d2ff; emissiveIntensity: 0.6" position="-0.85 -2.1 0"
                    animation="property: position; from: -0.85 -2.1 0; to: -0.45 -0.4 0; dur: 4000; loop: true; easing: linear"></a-sphere>
                <a-sphere radius="0.12" color="#00d2ff" material="emissive: #00d2ff; emissiveIntensity: 0.6" position="-0.85 -2.1 0"
                    animation="property: position; from: -0.85 -2.1 0; to: -0.45 -0.4 0; dur: 4000; delay: 2000; loop: true; easing: linear"></a-sphere>

            </a-entity>
        </a-marker>
        
        <!-- Kamera Pengguna -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Sembunyikan loading screen saat scene A-Frame telah termuat
        document.querySelector('a-scene').addEventListener('loaded', function () {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 1000); // Waktu tunggu ekstra agar memastikan arjs siap
        });
    </script>
</body>
</html>
