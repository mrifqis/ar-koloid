<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AR Efek Tyndall: Larutan Sejati vs Koloid</title>

  <!-- Library CDN: A-Frame + AR.js. Tidak memakai aset eksternal lain. -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: none;
      overscroll-behavior: none;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
    }

    video, canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100dvh !important;
      object-fit: contain !important;
    }

    #ui {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(94vw, 560px);
      z-index: 9999;
      background: rgba(255, 255, 255, 0.94);
      color: #0f172a;
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.30);
      text-align: center;
    }

    #ui h1 {
      margin: 0 0 6px;
      font-size: 1.02rem;
      line-height: 1.25;
    }

    #ui p {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.35;
      color: #475569;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 11px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.82rem;
      color: white;
      background: #2563eb;
    }

    button.off { background: #64748b; }
    button.green { background: #16a34a; }

    .hint {
      margin-top: 8px;
      font-size: 0.74rem !important;
      color: #334155 !important;
    }

    @media (max-width: 480px) {
      #ui { bottom: 10px; padding: 10px; }
      #ui h1 { font-size: 0.92rem; }
      #ui p { font-size: 0.76rem; }
      button { font-size: 0.74rem; padding: 7px 9px; }
    }
  </style>
</head>

<body>
  <!-- Overlay petunjuk. Tidak memengaruhi objek AR. -->
  <div id="ui">
    <h1>Simulasi Efek Tyndall</h1>
    <p><b>Larutan sejati meneruskan cahaya</b>, sedangkan <b>koloid menghamburkan cahaya</b>.</p>
    <div class="controls">
      <button id="toggleLamp">Matikan Lampu</button>
      <button id="toggleLabels" class="green">Sembunyikan Label</button>
      <button id="toggleScatter" class="green">Sembunyikan Hamburan</button>
    </div>
    <p class="hint">Arahkan kamera ke marker Hiro. Gunakan HTTPS/GitHub Pages agar kamera Android bisa aktif.</p>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; precision: mediump"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">

    <!-- Komponen kecil untuk membuat partikel hamburan berkedip halus -->
    <script>
      AFRAME.registerComponent('soft-pulse', {
        schema: {
          min: { type: 'number', default: 0.45 },
          max: { type: 'number', default: 0.95 },
          speed: { type: 'number', default: 1.8 },
          phase: { type: 'number', default: 0 }
        },
        init: function () {
          if (!this.data.phase) this.data.phase = Math.random() * Math.PI * 2;
        },
        tick: function (time) {
          const t = time / 1000;
          const v = (Math.sin(t * this.data.speed + this.data.phase) + 1) / 2;
          const opacity = this.data.min + (this.data.max - this.data.min) * v;
          this.el.setAttribute('material', 'opacity', opacity);
        }
      });
    </script>

    <!-- Marker Hiro standar AR.js -->
    <a-marker preset="hiro">
      <!-- Skala dibuat sedang agar stabil dan proporsional di layar HP. -->
      <a-entity id="modelRoot" position="0 0.03 0" scale="0.68 0.68 0.68">

        <!-- Alas tipis di atas marker agar objek mudah dikenali -->
        <a-box position="0 -0.035 0" width="4.25" height="0.055" depth="2.35" color="#e0f2fe" opacity="0.72"></a-box>

        <!-- Judul 3D di atas objek -->
        <a-entity id="labelsTitle">
          <a-text value="Simulasi Efek Tyndall" position="0 1.62 -0.55" align="center" color="#ffffff" width="4.2"></a-text>
          <a-plane position="0 1.62 -0.565" width="2.75" height="0.28" color="#0f172a" opacity="0.76"></a-plane>
          <a-text value="Larutan sejati meneruskan cahaya, sedangkan koloid menghamburkan cahaya." position="0 1.36 -0.55" align="center" color="#111827" width="4.25" wrap-count="60"></a-text>
        </a-entity>

        <!-- ===================================================================
             UNIT 1: LARUTAN SEJATI
             =================================================================== -->
        <a-entity id="unitSolution" position="-0.92 0 0">
          <!-- Label -->
          <a-entity class="label3d">
            <a-text value="Larutan Sejati" position="0 1.13 0" align="center" color="#1e3a8a" width="2.5"></a-text>
            <a-text value="Contoh: air gula/garam" position="0 -0.05 0.78" rotation="-72 0 0" align="center" color="#334155" width="2.3"></a-text>
          </a-entity>

          <!-- Gelas kaca: cylinder transparan + ring atas/bawah + dasar -->
          <a-entity id="glassSolution" position="0 0.56 0">
            <a-cylinder radius="0.28" height="0.82" material="color: #dbeafe; opacity: 0.18; transparent: true; side: double; roughness: 0.08; metalness: 0.05"></a-cylinder>
            <a-cylinder radius="0.255" height="0.62" position="0 -0.06 0" material="color: #93c5fd; opacity: 0.26; transparent: true; side: double"></a-cylinder>
            <a-torus radius="0.285" radius-tubular="0.013" position="0 0.42 0" color="#bae6fd" opacity="0.9"></a-torus>
            <a-torus radius="0.255" radius-tubular="0.012" position="0 0.22 0" color="#93c5fd" opacity="0.75"></a-torus>
            <a-torus radius="0.285" radius-tubular="0.013" position="0 -0.42 0" color="#bae6fd" opacity="0.8"></a-torus>
            <a-cylinder radius="0.285" height="0.025" position="0 -0.43 0" material="color: #e0f2fe; opacity: 0.22; transparent: true"></a-cylinder>
          </a-entity>

          <!-- Lampu kiri untuk larutan sejati -->
          <a-entity class="lamp" position="-0.84 0.62 0">
            <a-cylinder radius="0.07" height="0.22" rotation="0 0 90" color="#111827"></a-cylinder>
            <a-cone radius-bottom="0.13" radius-top="0.045" height="0.20" rotation="0 0 -90" position="0.15 0 0" color="#374151"></a-cone>
            <a-sphere class="bulb" radius="0.045" position="0.27 0 0" material="color: #fef3c7; emissive: #fde047; emissiveIntensity: 1.8"></a-sphere>
            <a-text class="label3d" value="Lampu" position="0 0.18 0" align="center" color="#111827" width="0.9"></a-text>
          </a-entity>

          <!-- Layar di belakang/kanan gelas: pendar kuat karena cahaya tembus -->
          <a-entity id="screenSolution" position="0.86 0.62 0" rotation="0 90 0">
            <a-plane width="0.60" height="0.75" color="#f8fafc" opacity="0.88"></a-plane>
            <a-plane id="solutionGlow" position="0 0 0.006" width="0.38" height="0.38" material="color: #fef08a; emissive: #facc15; emissiveIntensity: 1.2; opacity: 0.88; transparent: true"></a-plane>
            <a-torus radius="0.22" radius-tubular="0.009" position="0 0 0.012" color="#facc15"></a-torus>
          </a-entity>
          <a-text class="label3d" value="Layar berpendar" position="0.86 1.08 0" align="center" color="#854d0e" width="1.4"></a-text>

          <!-- Sinar larutan sejati: lurus, tembus, tetapi bagian di dalam cairan dibuat tipis/redup -->
          <a-entity class="lightGroup" id="lightSolution">
            <!-- sinar dari lampu ke gelas -->
            <a-cylinder radius="0.015" height="0.58" rotation="0 0 90" position="-0.53 0.62 0" material="color: #fef08a; emissive: #facc15; emissiveIntensity: 1.25; opacity: 0.9; transparent: true"></a-cylinder>
            <!-- sinar di dalam larutan: sengaja samar -->
            <a-cylinder radius="0.009" height="0.52" rotation="0 0 90" position="0 0.62 0" material="color: #fef9c3; emissive: #fde047; emissiveIntensity: 0.55; opacity: 0.32; transparent: true"></a-cylinder>
            <!-- sinar keluar sampai layar: kuat dan lurus -->
            <a-cylinder radius="0.016" height="0.58" rotation="0 0 90" position="0.53 0.62 0" material="color: #fef08a; emissive: #facc15; emissiveIntensity: 1.4; opacity: 0.95; transparent: true"></a-cylinder>
            <a-sphere radius="0.043" position="0.84 0.62 0" material="color: #fef08a; emissive: #facc15; emissiveIntensity: 2.0"></a-sphere>
          </a-entity>
        </a-entity>

        <!-- ===================================================================
             UNIT 2: KOLOID
             =================================================================== -->
        <a-entity id="unitColloid" position="0.92 0 0">
          <!-- Label -->
          <a-entity class="label3d">
            <a-text value="Koloid" position="0 1.13 0" align="center" color="#9a3412" width="2.5"></a-text>
            <a-text value="Contoh: santan/air tajin" position="0 -0.05 0.78" rotation="-72 0 0" align="center" color="#334155" width="2.3"></a-text>
          </a-entity>

          <!-- Gelas kaca + cairan putih susu transparan -->
          <a-entity id="glassColloid" position="0 0.56 0">
            <a-cylinder radius="0.28" height="0.82" material="color: #f8fafc; opacity: 0.18; transparent: true; side: double; roughness: 0.08; metalness: 0.05"></a-cylinder>
            <a-cylinder radius="0.255" height="0.62" position="0 -0.06 0" material="color: #fff7ed; opacity: 0.48; transparent: true; side: double"></a-cylinder>
            <a-torus radius="0.285" radius-tubular="0.013" position="0 0.42 0" color="#e5e7eb" opacity="0.9"></a-torus>
            <a-torus radius="0.255" radius-tubular="0.012" position="0 0.22 0" color="#fed7aa" opacity="0.75"></a-torus>
            <a-torus radius="0.285" radius-tubular="0.013" position="0 -0.42 0" color="#e5e7eb" opacity="0.8"></a-torus>
            <a-cylinder radius="0.285" height="0.025" position="0 -0.43 0" material="color: #fff7ed; opacity: 0.25; transparent: true"></a-cylinder>
          </a-entity>

          <!-- Lampu kiri untuk koloid -->
          <a-entity class="lamp" position="-0.84 0.62 0">
            <a-cylinder radius="0.07" height="0.22" rotation="0 0 90" color="#111827"></a-cylinder>
            <a-cone radius-bottom="0.13" radius-top="0.045" height="0.20" rotation="0 0 -90" position="0.15 0 0" color="#374151"></a-cone>
            <a-sphere class="bulb" radius="0.045" position="0.27 0 0" material="color: #fef3c7; emissive: #fde047; emissiveIntensity: 1.8"></a-sphere>
            <a-text class="label3d" value="Lampu" position="0 0.18 0" align="center" color="#111827" width="0.9"></a-text>
          </a-entity>

          <!-- Layar di belakang/kanan gelas: hanya redup -->
          <a-entity id="screenColloid" position="0.86 0.62 0" rotation="0 90 0">
            <a-plane width="0.60" height="0.75" color="#f8fafc" opacity="0.88"></a-plane>
            <a-plane id="colloidDimGlow" position="0 0 0.006" width="0.22" height="0.22" material="color: #fef3c7; emissive: #facc15; emissiveIntensity: 0.18; opacity: 0.24; transparent: true"></a-plane>
          </a-entity>
          <a-text class="label3d" value="Layar redup" position="0.86 1.08 0" align="center" color="#78716c" width="1.3"></a-text>

          <!-- Sinar koloid: masuk lalu terlihat menghambur jelas di dalam cairan -->
          <a-entity class="lightGroup" id="lightColloid">
            <!-- sinar dari lampu masuk ke gelas -->
            <a-cylinder radius="0.016" height="0.58" rotation="0 0 90" position="-0.53 0.62 0" material="color: #fef08a; emissive: #facc15; emissiveIntensity: 1.35; opacity: 0.95; transparent: true"></a-cylinder>
            <!-- sinar utama di dalam koloid: lebih tebal dan tampak jelas -->
            <a-cylinder radius="0.020" height="0.50" rotation="0 0 90" position="-0.02 0.62 0" material="color: #fde047; emissive: #facc15; emissiveIntensity: 1.45; opacity: 0.78; transparent: true"></a-cylinder>
            <!-- sinar keluar sangat redup -->
            <a-cylinder radius="0.010" height="0.36" rotation="0 0 90" position="0.55 0.62 0" material="color: #fef3c7; emissive: #facc15; emissiveIntensity: 0.28; opacity: 0.22; transparent: true"></a-cylinder>
          </a-entity>

          <!-- Hamburan cahaya di dalam gelas koloid: titik dan garis pendek acak -->
          <a-entity id="scatterGroup">
            <!-- Halo/kabut cahaya di sekitar cairan -->
            <a-sphere position="0 0.62 0" scale="0.42 0.25 0.25" material="color: #fde68a; emissive: #facc15; emissiveIntensity: 0.55; opacity: 0.42; transparent: true" soft-pulse="min: 0.28; max: 0.58; speed: 1.4"></a-sphere>

            <!-- Partikel bercahaya -->
            <a-sphere radius="0.027" position="-0.16 0.74 0.06" material="color: #fff7ad; emissive: #fde047; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" soft-pulse="min:0.55; max:1; speed:2.3"></a-sphere>
            <a-sphere radius="0.022" position="0.06 0.70 -0.10" material="color: #fff7ad; emissive: #fde047; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" soft-pulse="min:0.45; max:0.95; speed:2.1"></a-sphere>
            <a-sphere radius="0.025" position="0.15 0.56 0.09" material="color: #fff7ad; emissive: #fde047; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" soft-pulse="min:0.52; max:1; speed:2.5"></a-sphere>
            <a-sphere radius="0.018" position="-0.04 0.47 -0.07" material="color: #fff7ad; emissive: #fde047; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" soft-pulse="min:0.45; max:0.88; speed:2.0"></a-sphere>
            <a-sphere radius="0.020" position="0.20 0.82 -0.03" material="color: #fff7ad; emissive: #fde047; emissiveIntensity: 1.6; opacity: 0.9; transparent: true" soft-pulse="min:0.48; max:0.92; speed:2.7"></a-sphere>

            <!-- Garis-garis pendek hamburan ke berbagai arah -->
            <a-cylinder radius="0.008" height="0.36" rotation="0 0 35" position="0.02 0.78 0.03" material="color: #fde047; emissive: #facc15; emissiveIntensity: 1.3; opacity: 0.78; transparent: true" soft-pulse="min:0.35; max:0.9; speed:2.2"></a-cylinder>
            <a-cylinder radius="0.008" height="0.34" rotation="0 0 -38" position="0.03 0.47 -0.02" material="color: #fde047; emissive: #facc15; emissiveIntensity: 1.3; opacity: 0.72; transparent: true" soft-pulse="min:0.32; max:0.86; speed:2.0"></a-cylinder>
            <a-cylinder radius="0.007" height="0.34" rotation="0 55 90" position="-0.02 0.63 0.13" material="color: #fde047; emissive: #facc15; emissiveIntensity: 1.3; opacity: 0.72; transparent: true" soft-pulse="min:0.28; max:0.82; speed:2.4"></a-cylinder>
            <a-cylinder radius="0.007" height="0.32" rotation="0 -55 90" position="0.02 0.63 -0.13" material="color: #fde047; emissive: #facc15; emissiveIntensity: 1.3; opacity: 0.72; transparent: true" soft-pulse="min:0.28; max:0.82; speed:2.6"></a-cylinder>
            <a-cylinder radius="0.006" height="0.28" rotation="35 0 90" position="0.14 0.69 0.02" material="color: #fff7ad; emissive: #fde047; emissiveIntensity: 1.1; opacity: 0.66; transparent: true" soft-pulse="min:0.28; max:0.78; speed:2.8"></a-cylinder>
          </a-entity>
        </a-entity>

        <!-- Panel kesimpulan pada alas -->
        <a-entity class="label3d" position="0 0.02 0.92" rotation="-78 0 0">
          <a-plane width="3.8" height="0.38" color="#ffffff" opacity="0.84"></a-plane>
          <a-text value="Amati: layar larutan sejati berpendar kuat, sedangkan pada koloid sinar tampak jelas menyebar di dalam gelas." position="0 0 0.01" align="center" color="#0f172a" width="3.55" wrap-count="58"></a-text>
        </a-entity>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Tombol interaksi sederhana untuk kebutuhan demonstrasi kelas.
    const toggleLamp = document.getElementById('toggleLamp');
    const toggleLabels = document.getElementById('toggleLabels');
    const toggleScatter = document.getElementById('toggleScatter');

    const lightGroups = document.querySelectorAll('.lightGroup');
    const bulbs = document.querySelectorAll('.bulb');
    const glowSolution = document.getElementById('solutionGlow');
    const glowColloid = document.getElementById('colloidDimGlow');
    const labels = document.querySelectorAll('.label3d, #labelsTitle');
    const scatterGroup = document.getElementById('scatterGroup');

    let lampOn = true;
    let labelsOn = true;
    let scatterOn = true;

    toggleLamp.addEventListener('click', () => {
      lampOn = !lampOn;

      lightGroups.forEach(el => el.setAttribute('visible', lampOn ? 'true' : 'false'));
      bulbs.forEach(el => {
        el.setAttribute('material', lampOn
          ? 'color: #fef3c7; emissive: #fde047; emissiveIntensity: 1.8'
          : 'color: #cbd5e1; emissive: #000000; emissiveIntensity: 0');
      });

      if (glowSolution) glowSolution.setAttribute('visible', lampOn ? 'true' : 'false');
      if (glowColloid) glowColloid.setAttribute('visible', lampOn ? 'true' : 'false');
      if (scatterGroup) scatterGroup.setAttribute('visible', lampOn && scatterOn ? 'true' : 'false');

      toggleLamp.textContent = lampOn ? 'Matikan Lampu' : 'Nyalakan Lampu';
      toggleLamp.classList.toggle('off', !lampOn);
    });

    toggleLabels.addEventListener('click', () => {
      labelsOn = !labelsOn;
      labels.forEach(el => el.setAttribute('visible', labelsOn ? 'true' : 'false'));
      toggleLabels.textContent = labelsOn ? 'Sembunyikan Label' : 'Tampilkan Label';
      toggleLabels.classList.toggle('off', !labelsOn);
      toggleLabels.classList.toggle('green', labelsOn);
    });

    toggleScatter.addEventListener('click', () => {
      scatterOn = !scatterOn;
      if (scatterGroup) scatterGroup.setAttribute('visible', lampOn && scatterOn ? 'true' : 'false');
      toggleScatter.textContent = scatterOn ? 'Sembunyikan Hamburan' : 'Tampilkan Hamburan';
      toggleScatter.classList.toggle('off', !scatterOn);
      toggleScatter.classList.toggle('green', scatterOn);
    });
  </script>
</body>
</html>
